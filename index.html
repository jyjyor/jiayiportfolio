<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jiayi Portfolio</title>
<link rel="stylesheet" href="https://use.typekit.net/han2bam.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>
<p id="myname">Jiayi</p>
<p class="section">Artwork</p>
<p class="project-num">1</p>
<div class="project">
    <img src="10C_Project1/Art10C_Project1_JJ.jpg" alt="Project 1">
    <p class="project-title">干</p>
    <p class="project-desc">Caution coils into wire, labor stands still, shaped like a word.</p>
</div>
<p class="project-num">2</p>
<div class="project">
    <div class="model-wrapper">
        <model-viewer
            src="assets/models/mushroom-study.glb"
            alt="A 3D study of my mushroom sculpture"
            shadow-intensity="1"
            camera-controls
            auto-rotate
            ar
            class="project-model-viewer">
        </model-viewer>
        <button class="model-expand-btn" aria-label="Expand 3D viewer" onclick="document.getElementById('mushroom-overlay').classList.add('active')">&#x26F6;</button>
    </div>
    <p class="project-title">Mushroom Study</p>
    <p class="project-desc">Placeholder mesh — final scan coming soon</p>
</div>

<div class="model-overlay" id="mushroom-overlay">
    <button class="model-overlay-close" aria-label="Close" onclick="document.getElementById('mushroom-overlay').classList.remove('active')">&#x2715;</button>
    <model-viewer
        src="assets/models/mushroom-study.glb"
        alt="A 3D study of my mushroom sculpture"
        shadow-intensity="1"
        camera-controls
        auto-rotate
        ar>
    </model-viewer>
</div>
<p class="project-num">3</p>
<p class="section">About</p>
</body>
</html>
